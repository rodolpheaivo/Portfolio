<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rodolphe Aïvo — Positioning, GTM & Fullstack Execution for B2B startups and premium service firms.">
  <title>Rodolphe Aïvo | Positioning, GTM & Fullstack Execution</title>
  <style>
    :root {
      --bg: #091119;
      --bg-2: #0f1b27;
      --surface: rgba(17, 28, 40, 0.76);
      --line: rgba(223, 232, 240, 0.12);
      --text: #eef4f7;
      --muted: #9caebb;
      --accent: #8ee3ff;
      --accent-2: #d7c0ff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      --display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      --body: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--body);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(142, 227, 255, 0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(215, 192, 255, 0.16), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, #0c1622 100%);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    .page-shell {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 18px;
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 20px;
      margin-top: 18px;
      padding: 16px 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(8, 14, 21, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand {
      font-family: var(--display);
      font-size: 1.5rem;
      letter-spacing: .03em;
    }

    .site-nav ul {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .site-nav a { color: var(--muted); font-size: .94rem; }
    .site-nav a:hover { color: var(--text); }

    .lang-switcher {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.03);
    }

    .lang-switcher button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .lang-switcher button.active {
      background: rgba(142, 227, 255, 0.12);
      color: var(--text);
    }

    .page-main { padding: 60px 0 72px; }

    .hero-section {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(280px, .92fr);
      gap: 32px;
      align-items: stretch;
    }

    .panel,
    .hero-copy,
    .hero-panel,
    .info-card,
    .niche-card,
    .offer-card,
    .proof-item,
    .case-card,
    .about-panel,
    .contact-form,
    .contact-aside {
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 28px;
    }

    .hero-copy { padding: 42px; border-radius: 36px; }
    .hero-panel { padding: 24px; border-radius: 36px; }

    .eyebrow,
    .section-kicker,
    .offer-price,
    .case-niche,
    .contact-aside__label {
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--accent);
      font-size: .78rem;
    }

    h1, h2, h3 {
      margin: 0;
      font-family: var(--display);
      font-weight: 400;
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(2.7rem, 5vw, 5.2rem);
      line-height: .95;
    }

    h2 {
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1.04;
    }

    h3 { font-size: 1.6rem; line-height: 1.1; }

    .hero-subtitle,
    .hero-description,
    .section-heading p,
    .info-card p,
    .niche-card p,
    .offer-card p,
    .proof-item p,
    .case-card p,
    .about-panel p,
    .contact-note,
    .site-footer p {
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-subtitle {
      margin-top: 18px;
      font-size: 1.2rem;
      color: var(--text);
      max-width: 32rem;
    }

    .hero-description { margin-top: 18px; max-width: 42rem; }

    .hero-cta-row {
      display: flex;
      gap: 14px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .button:hover { transform: translateY(-2px); }
    .button--primary {
      background: linear-gradient(135deg, rgba(142, 227, 255, 0.18), rgba(215, 192, 255, 0.18));
      border-color: rgba(142, 227, 255, 0.28);
      color: var(--text);
    }
    .button--secondary {
      border-color: var(--line);
      color: var(--text);
    }

    .metric-row,
    .niche-focus,
    .offer-points,
    .stack-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
    }

    .metric-row li,
    .niche-focus li,
    .offer-points li,
    .stack-list li {
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-size: .92rem;
    }

    .hero-panel__frame {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      min-height: 100%;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .hero-panel__glow {
      position: absolute;
      inset: auto 20% -20% auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(142,227,255,.22), transparent 62%);
    }

    .hero-panel__column {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .hero-panel__column span {
      display: block;
      padding: 20px 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.02);
      color: var(--muted);
    }

    .hero-panel__column--accent span {
      color: var(--text);
      border-color: rgba(142,227,255,.22);
    }

    .section { padding-top: 88px; }
    .section-heading { max-width: 760px; margin-bottom: 28px; }
    .section-heading h2 { margin: 12px 0 14px; }

    .card-grid,
    .niche-grid,
    .offer-grid,
    .proof-list,
    .case-grid,
    .contact-layout {
      display: grid;
      gap: 18px;
    }

    .card-grid, .proof-list { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .niche-grid, .offer-grid, .case-grid, .contact-layout { grid-template-columns: repeat(2, minmax(0,1fr)); }

    .info-card,
    .niche-card,
    .offer-card,
    .proof-item,
    .case-card,
    .about-panel,
    .contact-form,
    .contact-aside { padding: 26px; }

    .niche-meta { margin: 0 0 12px; color: var(--text) !important; }
    .offer-price { margin-bottom: 10px; }

    .case-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .case-visual {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-height: 180px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, rgba(142,227,255,.14), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .case-visual::before,
    .case-visual::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(142,227,255,.22);
      border-radius: 50%;
    }

    .case-visual::before { width: 140px; height: 140px; }
    .case-visual::after { width: 90px; height: 90px; }

    .case-visual-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .case-visual span {
      position: relative;
      z-index: 1;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(8,14,21,.74);
      border: 1px solid var(--line);
    }

    .about-panel { max-width: 760px; }
    .about-panel p + p { margin-top: 16px; }

    .contact-form {
      display: grid;
      gap: 14px;
    }

    .contact-form input,
    .contact-form select,
    .contact-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px 16px;
      color: var(--text);
      background: rgba(255,255,255,.03);
    }

    .contact-form textarea { resize: vertical; }
    .contact-aside { display: flex; flex-direction: column; gap: 14px; }
    .contact-success { color: var(--accent); }
    .site-footer { padding: 0 0 56px; }
    .site-footer p { max-width: 620px; }

    @media (max-width: 980px) {
      .site-header,
      .hero-section,
      .card-grid,
      .niche-grid,
      .offer-grid,
      .proof-list,
      .case-grid,
      .contact-layout {
        grid-template-columns: 1fr;
      }
      .site-header { position: static; }
      .site-nav { display: none; }
      .hero-copy, .hero-panel { padding: 28px; }
    }

    @media (max-width: 720px) {
      .page-shell { width: min(100% - 20px, 1200px); }
      .site-header { grid-template-columns: 1fr; justify-items: start; }
      .hero-cta-row { flex-direction: column; }
      .button { width: 100%; }
    }
  </style>
</head>

    const storageKey = "portfolio-locale";
    const detectLocale = () => navigator.language.toLowerCase().startsWith("fr") ? "fr" : "en";
    let locale = localStorage.getItem(storageKey);
    if (locale !== "fr" && locale !== "en") locale = detectLocale();

    const navList = document.getElementById("nav-list");
    const heroMetrics = document.getElementById("hero-metrics");
    const positioningGrid = document.getElementById("positioning-grid");
    const nichesGrid = document.getElementById("niches-grid");
    const offersGrid = document.getElementById("offers-grid");
    const proofGrid = document.getElementById("proof-grid");
    const portfolioGrid = document.getElementById("portfolio-grid");
    const aboutContent = document.getElementById("about-content");

    function render() {
      const t = content[locale];
      document.documentElement.lang = locale;
      document.title = t.metaTitle;

      document.getElementById("lang-fr").classList.toggle("active", locale === "fr");
      document.getElementById("lang-en").classList.toggle("active", locale === "en");

      navList.innerHTML = t.nav.map(([label, href]) => `<li><a href="${href}">${label}</a></li>`).join("");

      document.getElementById("hero-eyebrow").textContent = t.hero.eyebrow;
      document.getElementById("hero-title").textContent = t.hero.title;
      document.getElementById("hero-subtitle").textContent = t.hero.subtitle;
      document.getElementById("hero-description").textContent = t.hero.description;
      document.getElementById("hero-primary").textContent = t.hero.primary;
      document.getElementById("hero-secondary").textContent = t.hero.secondary;
      heroMetrics.innerHTML = t.hero.metrics.map((item) => `<li>${item}</li>`).join("");

      document.getElementById("positioning-title").textContent = t.positioning.title;
      document.getElementById("positioning-intro").textContent = t.positioning.intro;
      positioningGrid.innerHTML = t.positioning.items.map(([title, body]) => `
        <article class="info-card">
          <h3>${title}</h3>
          <p>${body}</p>
        </article>`).join("");

      document.getElementById("niches-title").textContent = t.niches.title;
      document.getElementById("niches-intro").textContent = t.niches.intro;
      nichesGrid.innerHTML = t.niches.items.map((item) => `
        <article class="niche-card">
          <h3>${item.title}</h3>
          <p class="niche-meta">${item.audience}</p>
          <p>${item.pain}</p>
          <ul class="niche-focus">${item.focus.map((f) => `<li>${f}</li>`).join("")}</ul>
        </article>`).join("");

      document.getElementById("offers-title").textContent = t.offers.title;
      document.getElementById("offers-intro").textContent = t.offers.intro;
      offersGrid.innerHTML = t.offers.items.map(([price, title, body, bullets]) => `
        <article class="offer-card">
          <p class="offer-price">${price}</p>
          <h3>${title}</h3>
          <p>${body}</p>
          <ul class="offer-points">${bullets.map((b) => `<li>${b}</li>`).join("")}</ul>
        </article>`).join("");

      document.getElementById("proof-title").textContent = t.proof.title;
      document.getElementById("proof-intro").textContent = t.proof.intro;
      proofGrid.innerHTML = t.proof.items.map(([title, body]) => `
        <article class="proof-item">
          <h3>${title}</h3>
          <p>${body}</p>
        </article>`).join("");

      document.getElementById("portfolio-title").textContent = t.portfolio.title;
      document.getElementById("portfolio-intro").textContent = t.portfolio.intro;
      portfolioGrid.innerHTML = t.portfolio.items.map(([visual, niche, title, problem, response, outcome, stack]) => `
        <article class="case-card">
          <div class="case-visual">
            <div class="case-visual-grid"></div>
            <span>${visual}</span>
          </div>
          <p class="case-niche">${niche}</p>
          <h3>${title}</h3>
          <p><strong>Problem.</strong> ${problem}</p>
          <p><strong>Response.</strong> ${response}</p>
          <p><strong>Outcome.</strong> ${outcome}</p>
          <ul class="stack-list">${stack.map((s) => `<li>${s}</li>`).join("")}</ul>
        </article>`).join("");

      document.getElementById("about-title").textContent = t.about.title;
      aboutContent.innerHTML = t.about.paragraphs.map((paragraph) => `<p>${paragraph}</p>`).join("");

      document.getElementById("contact-title").textContent = t.contact.title;
      document.getElementById("contact-intro").textContent = t.contact.intro;
      document.getElementById("contact-submit").textContent = t.contact.submit;
      document.getElementById("contact-direct-label").textContent = t.contact.direct;
      document.getElementById("contact-email-link").textContent = t.contact.emailLabel;
      document.getElementById("contact-note").textContent = t.contact.note;
      document.getElementById("contact-success").textContent = t.contact.success;
      document.getElementById("footer-note").textContent = t.footer;

      const [namePh, emailPh, companyPh, websitePh, timelinePh, messagePh] = t.contact.placeholders;
      document.getElementById("field-name").placeholder = namePh;
      document.getElementById("field-email").placeholder = emailPh;
      document.getElementById("field-company").placeholder = companyPh;
      document.getElementById("field-website").placeholder = websitePh;
      document.getElementById("field-timeline").placeholder = timelinePh;
      document.getElementById("field-message").placeholder = messagePh;

      document.getElementById("field-needType").innerHTML = t.contact.types.map((item) => `<option value="${item}">${item}</option>`).join("");
      document.getElementById("field-budget").innerHTML = t.contact.budgets.map((item) => `<option value="${item}">${item}</option>`).join("");
    }

    document.getElementById("lang-fr").addEventListener("click", () => {
      locale = "fr";
      localStorage.setItem(storageKey, locale);
      render();
    });

    document.getElementById("lang-en").addEventListener("click", () => {
      locale = "en";
      localStorage.setItem(storageKey, locale);
      render();
    });

    document.getElementById("contact-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const t = content[locale].contact;
      const form = new FormData(event.currentTarget);
      const body = encodeURIComponent([
        `Nom: ${form.get("name") || ""}`,
        `Email: ${form.get("email") || ""}`,
        `Entreprise: ${form.get("company") || ""}`,
        `Site: ${form.get("website") || ""}`,
        `Besoin: ${form.get("needType") || ""}`,
        `Budget: ${form.get("budget") || ""}`,
        `Délai: ${form.get("timeline") || ""}`,
        "",
        `${form.get("message") || ""}`
      ].join("\n"));

      const subject = encodeURIComponent(`[Portfolio] ${form.get("needType") || ""}`);
      window.location.href = `mailto:rodolpheaivo@gmail.com?subject=${subject}&body=${body}`;
      const success = document.getElementById("contact-success");
      success.hidden = false;
      success.textContent = t.success;
    });

    render();
  </script>
